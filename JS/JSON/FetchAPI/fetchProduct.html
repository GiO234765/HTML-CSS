<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:30px;
        }

        .main-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:20px;
        }

        .card{
            background:#fff;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .content{
            padding:20px;
        }

        .title{
            margin-bottom:10px;
        }

        .des{
            color:#666;
            margin-bottom:15px;
            height:60px;
            overflow:hidden;
        }

        .price-btn{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .price{
            color:green;
        }

        .buy{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
        }

        .buy:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="main-container">

</div>

<script>

const url = "https://dummyjson.com/products";

fetch(url)
.then(res => res.json())
.then(data => {

    const container = document.querySelector(".main-container");

    data.products.map(product => {

        container.innerHTML += `
            <div class="card">
                <img src="${product.thumbnail}" alt="${product.title}">

                <div class="content">
                    <h2 class="title">${product.title}</h2>

                    <p class="des">
                        ${product.description}
                    </p>

                    <div class="price-btn">
                        <h2 class="price">$${product.price}</h2>
                        <button class="buy">Buy Now</button>
                    </div>
                </div>
            </div>
        `;
    });
})
.catch(error => {
    console.log(error);
});
</script>

</body>
</html>
