<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parameter and None Parameter</title>
  </head>
  <body>
    <!-- script -->
    <script>
      //Function return and none return
      function message() {
        // None return function
        console.log(" Hello, I am Oppo midland");
      }
      // Called function message
      message();


        //return function
      //let user_age = prompt("Enter Your Age:");
      alert(user_age);

      function userAge(age) {
        return age;
      }
      //Called the function userAge
      console.log(" Your age is " + userAge(user_age));     //argument
    </script>
  </body>
</html>
