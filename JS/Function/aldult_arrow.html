<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow function</title>
</head>
<body>
    <!-- main content -->

    <!-- script -->
     <script>
        //Arrow function 
        const user_age =[15,38,28,18,9];
        //Check the age of users
        const check_user_age = user_age.filter(function(age){
            return age>=18;
        })
        console.log("Adults age list: ",check_user_age)

        
     </script>
</body>
</html>
