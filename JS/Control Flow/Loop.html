<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop</title>
  </head>
  <body>
    <script>
      // For loop
      for (let i = 0; i < 5; i++) {
        console.log(`លេខ: ${i}`);
      }
      // While loop
      let count = 0;
      while (count < 5) {
        console.log(`ចំនួន: ${count}`);
        count++;
      }
    </script>
  </body>
</html>
