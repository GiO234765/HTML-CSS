<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
</head>
<body>
    <!-- main content -->

    <!-- script -->
     <script>
        //Map can change each element and get a new array 
        numbers =[12,4,57,56,3]
        //Map Array 
        numbers.map((value,index)=>{
            //Index of the value
            console.log(index)
            //Value of the index
            console.log(value)
            //Conbime value and index together 
            console.log(`Value && Index[${index}]: ${value}`)
        })
     </script>
</body>
</html>
