<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>true & false</title>
  </head>
  <style>
    .main_contain {
      gap: 10px;
      position: relative;
    }
    button {
      cursor: pointer;
      width: 100px;
      height: 100px;
      padding: 5px;
      border: none;
      border-radius: 20%;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sleep {
      transition: 0.5s;
      &:hover {
        background-color: pink;
      }
    }
    .study {
      transition: 0.5s;
      &:hover {
        background-color: rgb(130, 206, 206);
      }
    }
    .congr_sleep {
        transition: 0.5s ease;
      width: 400px;
      height: 400px;
      border-radius: 40px;
      background-color: aliceblue;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      z-index: 1000;
    }
  </style>
  <body>
    <div class="congr_sleep absolute">
      <!-- gif -->
      <img src="" alt="" class="gif" />
    </div>
    <div class="main_contain flex">
      <button class="sleep" id="btn_sleep">Sleep</button>
      <button class="study" id="btn_study">Study</button>
    </div>
    <script>
      const btnSleep = document.getElementById("btn_sleep");
      const btnStudy = document.getElementById("btn_study");
      const congrScreen = document.querySelector(".congr_sleep");

      // Hide congratulation
      congrScreen.style.display = "none";

      // Sleep button
      btnSleep.addEventListener("click", () => {
        congrScreen.style.display = "flex";
        congrScreen.style.justifyContent = "center";
        congrScreen.style.alignItems = "center";

        congrScreen.innerHTML = `
        <div style="text-align:center;">
            <h1>🎉 Congratulations! 🎉</h1>
            <p>Good ideas😴</p>
            <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
                 width="250">
        </div>
    `;
      });

      function moveButton() {
        const maxX = window.innerWidth - btnStudy.offsetWidth;
        const maxY = window.innerHeight - btnStudy.offsetHeight;

        const randomX = Math.random() * maxX* 0.5;
        const randomY = Math.random() * maxY * 0.5;

        btnStudy.style.position = "absolute";
        btnStudy.style.left = randomX + "px";
        btnStudy.style.top = randomY + "px";
      }
      btnStudy.addEventListener("mouseenter", moveButton);
      btnStudy.addEventListener("click", moveButton);
    </script>
  </body>
</html>
