<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>

    <style>
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #eee;
      }

      .main-container {
        border: none;
        position: relative;
        width: 300px;
        height: 360px;
        border-radius: 20px;
        overflow: hidden;
        background: #fff;
        box-shadow:
          rgba(0, 0, 0, 0.16) 0px 1px 4px,
          rgb(51, 51, 51) 0px 0px 0px 3px;
      }

      /* image */
      .image {
        width: 100%;
        padding: 10px;
      }

      /* hover cart */
      .cart {
        
        font-family: Arial, Helvetica, sans-serif;
        gap: 5px;
        display: flex;
        justify-content: center;
        position: absolute;
        top: 50%;
        right: -160px;
        transform: translateY(-50%);
        background: #1e88ff;
        color: #fff;
        padding: 12px 20px;
        border-radius: 25px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.4s ease;
      }

      /* hover animation */
      .main-container:hover .cart {
        right: 20px;
      }

      h2 {
        padding: 0 15px;
        margin: 10px 0 5px;
      }

      .stars {
        display: flex;
        padding: 0 15px;
      }

      .discount {
        padding: 10px 15px;
      }

      .discount p {
        text-decoration: line-through;
        color: #999;
        margin: 0;
      }

      .discount {
        display: flex;
        font-family: Arial, Helvetica, sans-serif;
        align-items: center;
      }
      .discount h2 {
        margin-left: 0;
      }
      h2 {
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>
