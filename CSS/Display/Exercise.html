<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fullscreen Flex Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style> 
      html,
      body {
        height: 100%;
      }

      body {
        display: table;
        width: 100%;
        height: 100%;
        background-color: #111; /* Background color */
        color: #f2f2f2; /* Text color */
        line-height: 1.6;
        position: relative;
        font-family: sans-serif;
        overflow: hidden;
      }

      .lines {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        margin: auto;
        width: 90vw;
        display: flex;
        justify-content: space-between; /* Distribute lines evenly */
      }

      .line {
        position: relative;
        width: 5px;
        height: 100%;
        /*background: #ffffff;  /* Line color */
        overflow: hidden;
      }

      .line::after {
        content: "";
        display: block;
        position: absolute;
        height: 15vh;
        width: 100%;
        top: -50%;
        left: 0;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #ffffff 75%,
          #ffffff 100%
        );
        animation: drop 7s 0s infinite;
        animation-fill-mode: forwards;
        animation-timing-function: cubic-bezier(0.4, 0.26, 0, 0.97);
      }

      /* Different colors for each line's pseudo-element */
      .line:nth-child(1)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #ff4500 75%,
          #ff4500 100%
        );
        animation-delay: 0.5s;
      }

      .line:nth-child(2)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #32cd32 75%,
          #32cd32 100%
        );
        animation-delay: 1s;
      }

      .line:nth-child(3)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #1e90ff 75%,
          #1e90ff 100%
        );
        animation-delay: 1.5s;
      }

      .line:nth-child(4)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #ffd700 75%,
          #ffd700 100%
        );
        animation-delay: 2s;
      }

      .line:nth-child(5)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #8a2be2 75%,
          #8a2be2 100%
        );
        animation-delay: 2.5s;
      }

      .line:nth-child(6)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #20b2aa 75%,
          #20b2aa 100%
        );
        animation-delay: 3s;
      }

      .line:nth-child(7)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #dc143c 75%,
          #dc143c 100%
        );
        animation-delay: 3.5s;
      }

      .line:nth-child(8)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #00fa9a 75%,
          #00fa9a 100%
        );
        animation-delay: 4s;
      }

      .line:nth-child(9)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #ff1493 75%,
          #ff1493 100%
        );
        animation-delay: 4.5s;
      }

      .line:nth-child(10)::after {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          #00bfff 75%,
          #00bfff 100%
        );
        animation-delay: 5s;
      }

      @keyframes drop {
        0% {
          top: -50%;
        }
        100% {
          top: 110%;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      .page {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 12px;
        background: #f0f0f0;
      }

      .top {
        height: 10%;
      }
      .one {
        background: #ff6b6b;
      }
      .two {
        background: #feca57;
      }
      .middle {
        flex: 1;
        display: flex;
      }
      .left {
        width: 20%;
        background: #54a0ff;
      }
      /* right stacked boxes */
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .three {
        flex: 1;
        background: #1dd1a1;
      }
      .four {
        flex: 1;
        background: #5f27cd;
      }
      .bottom {
        height: 15%;
        background: #576574;
      }
    </style>
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>

    <div class="page">
      <div class="box top one"></div>
      <div class="box top two"></div>

      <div class="middle">
        <div class="box left"></div>

        <div class="right">
          <div class="box three"></div>
          <div class="box four"></div>
        </div>
      </div>
      <!-- Footer -->
      <div class="box bottom"></div>
    </div>
  </body>
</html>
