<!doctype html>
<html>
  <head>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .container {
        position: relative;
        width: 300px;
        height: 450px;
        box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
      }

      .container img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s;
      }

      .img2 {
        opacity: 0;
        transition-delay: 0.4s;
      }

      .container:hover .img2 {
        opacity: 1;
      }

      .container:hover .img1 {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        class="img1"
        src="https://i.pinimg.com/736x/e5/56/a0/e556a09255ec2896eb4b3c35669c036a.jpg" />
      <img
        class="img2"
        src="https://i.pinimg.com/1200x/69/98/b9/6998b9771c24d36245034b7a06942e91.jpg" />
    </div>
  </body>
</html>
