<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
</head>
<style>
    .box {
        width: 100px;
        height: 100px;
        background-color: red;
        transition: background-color 0.5s ease, transform 0.9s ease , border-radius 0.5s ease;
    }
    .box:hover {
        background-color: blue;
        transform: rotate(360deg);
        border-radius: 50%;
    }
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
</style>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
