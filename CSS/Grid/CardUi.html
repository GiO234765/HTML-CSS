<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card UI</title>
  </head>
  <!-- style -->
  <style>
    .header-nav {
      display: flex;
      gap: 16px;
      width: 100%;
      padding: 10px;
      background-color: aliceblue;
      box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
    }
    .button {
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      background-color: transparent;
      transition: 0.7s;
      font-family: Arial, Helvetica, sans-serif;
      &:hover {
        background-color: lightblue;
        cursor: pointer;
        backdrop-filter: blur(5px);
        border-radius: 30px;
        box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
        transform: scale(1.1);
      }
    }
    .main-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      padding: 20px;
    }
    .card {
      position: relative;
      background-color: palevioletred;
      width: 300px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      border-radius: 10px;
      box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
      transition: 0.7s;
      &:hover {
        transform: scale(1.05);
        box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
        cursor: pointer;
        background-color: lightpink;
        border-radius: 20px;
      }
    }
    img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    .profile {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 50px;
      height: 50px;
      background-color: white;
      border-radius: 50%;
    }
    .top-head{
        display: flex;
    }
    .user-name{
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: bold;
    }
  </style>
  <body>
    <!-- Header -->
    <header class="header-nav">
      <div class="button">Home</div>
      <div class="button">About</div>
      <div class="button">Services</div>
      <div class="button">Contact</div>
    </header>
    <!-- Main Content -->
    <div class="main-container">
      <div class="card">
        <div class="top-head">
          <div class="profile">
            <img
              src="https://i.pinimg.com/1200x/fa/55/40/fa5540445cd82b3ca71a25c5071de76a.jpg"
              alt=""
              class="" />
          </div>
        </div>
      </div>
      <div class="card">
        <div class="profile">
          <img
            src="https://i.pinimg.com/1200x/fa/55/40/fa5540445cd82b3ca71a25c5071de76a.jpg"
            alt=""
            class="" />
            <div class="about-user">
                <div class="user-name">John Doe</div>
                <div class="user-title">Software Engineer</div>
            </div>
        </div>
      </div>
      <div class="card">
        <div class="profile">
          <img
            src="https://i.pinimg.com/1200x/fa/55/40/fa5540445cd82b3ca71a25c5071de76a.jpg"
            alt=""
            class="" />
        </div>
      </div>
      <div class="card">
        <div class="profile">
          <img
            src="https://i.pinimg.com/1200x/fa/55/40/fa5540445cd82b3ca71a25c5071de76a.jpg"
            alt=""
            class="" />
        </div>
      </div>
      <div class="card">
        <div class="profile">
          <img
            src="https://i.pinimg.com/1200x/fa/55/40/fa5540445cd82b3ca71a25c5071de76a.jpg"
            alt=""
            class="" />
        </div>
      </div>
      <div class="card">
        <div class="profile">
          <img
            src="https://i.pinimg.com/1200x/fa/55/40/fa5540445cd82b3ca71a25c5071de76a.jpg"
            alt=""
            class="" />
        </div>
      </div>
    </div>
  </body>
</html>
