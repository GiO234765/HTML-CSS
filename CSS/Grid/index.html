<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Grid + Flexbox</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Style -->
    <style>
      /* ===== Base (Phone first) ===== */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .layout {
        display: grid;
        grid-template-areas:
          "header"
          "main"
          "footer";
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      /* ===== Header ===== */
      .header {
        grid-area: header;
        background: #1e40af;
        color: white;
        padding: 16px;

        /* Flexbox */
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        color: white;
        text-decoration: none;
      }

      /* ===== Sidebar ===== */
      .sidebar {
        grid-area: sidebar;
        background: #e5e7eb;
        padding: 16px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
      }

      /* ===== Main ===== */
      .main {
        grid-area: main;
        padding: 16px;
      }

      /* Cards using Flexbox */
      .cards {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        background: #4f46e5;
        color: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
      }

      /* ===== Footer ===== */
      .footer {
        grid-area: footer;
        background: #1e293b;
        color: white;
        text-align: center;
        padding: 12px;
      }

      /* ===== Tablet (iPad) ===== */
      @media (min-width: 768px) {
        .layout {
          grid-template-areas:
            "header header"
            "sidebar main"
            "footer footer";
          grid-template-columns: 200px 1fr;
        }

        .cards {
          flex-direction: row;
          flex-wrap: wrap;
        }

        .card {
          flex: 1 1 calc(50% - 12px);
        }
      }

      /* ===== Desktop ===== */
      @media (min-width: 1024px) {
        .card {
          flex: 1 1 calc(25% - 12px);
        }
      }
    </style>
    <div class="layout">
      <header class="header">
        <h1>My Website</h1>
        <nav class="nav">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </nav>
      </header>

      <aside class="sidebar">
        <ul>
          <li>Dashboard</li>
          <li>Profile</li>
          <li>Settings</li>
        </ul>
      </aside>

      <main class="main">
        <div class="cards">
          <div class="card">Card 1</div>
          <div class="card">Card 2</div>
          <div class="card">Card 3</div>
          <div class="card">Card 4</div>
        </div>
      </main>

      <footer class="footer">© 2026 My Website</footer>
    </div>
  </body>
</html>
