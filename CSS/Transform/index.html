<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale</title>
  </head>
  <!-- style -->
  <style>
        body {
          display: flex;
          height: 100vh;
          width: 100vw;
          justify-content: center;
          align-items: center;
        }
        .main-container {
          width: 300px;
          height: 300px;
          transform: scale(1.3);
          border: none;
          background-color: antiquewhite;
          transition: 0.5s ease-in-out;
          &:hover {
            border-radius: 50%;
            transform: scale(1.7);
            transform: rotate(360deg);
            background-color: pink;
          }
        }
      button {
      width: 300px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background-color: aquamarine;
      display: inline-block;

      transform: rotate(0deg);
      transition: transform 0.6s ease-in-out, background-color 0.6s ease-in-out;

      &:hover {
        background-color: pink;
        transform: rotate(360deg);
      }
    }
  </style>
  <body>
    <!-- Main content -->
    <button class="main-container"></button>
    <button class=""></button>
  </body>
</html>
